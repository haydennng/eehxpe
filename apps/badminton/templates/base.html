<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0b8457">
    <meta name="description" content="Manage badminton matchups, track scores, and view player statistics">
    <title>{% block title %}Badminton Matchup Manager{% endblock %}</title>
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/badminton/static/manifest.json">
    
    <!-- iOS PWA Support -->
    <link rel="apple-touch-icon" href="/badminton/static/icons/icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Badminton">
    
    <link rel="stylesheet" href="/badminton/static/css/style.css?v={{ range(1, 999999999) | random }}">
</head>
<body data-page="{% block page_id %}{% endblock %}">
    <!-- Mobile hamburger (visible only on mobile via CSS) -->
    <button id="mobile-menu-button"
            class="mobile-hamburger"
            aria-label="Open menu"
            aria-controls="mobile-sidenav"
            aria-expanded="false">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
    </button>

    <!-- Mobile dropdown navigation (slides down from hamburger) -->
    <nav id="mobile-sidenav" class="mobile-sidenav" aria-hidden="true">
        <!-- Mobile logo on the left -->
        <a href="/badminton/" class="mobile-nav-logo-link">
            <img src="/badminton/static/images/logo.png?v={{ range(1, 999999999) | random }}" alt="eehxpe" class="mobile-nav-logo">
        </a>
        <ul class="mobile-nav-list">
            <li class="mobile-nav-item">
                <a class="mobile-nav-link" href="/badminton/dashboard" aria-label="Dashboard">
                    <img src="/badminton/static/images/dashboard.svg" alt="" class="mobile-nav-icon">
                </a>
            </li>
            <li class="mobile-nav-item">
                <a class="mobile-nav-link" href="/badminton/profile" aria-label="Profile">
                    <img src="/badminton/static/images/players.svg" alt="" class="mobile-nav-icon">
                </a>
            </li>
            <li class="mobile-nav-item">
                <a class="mobile-nav-link" href="/badminton/players" aria-label="Players">
                    <img src="/badminton/static/images/players.svg" alt="" class="mobile-nav-icon">
                </a>
            </li>
            <li class="mobile-nav-item">
                <a class="mobile-nav-link mobile-nav-link--matchups" href="/badminton/matchups" aria-label="Matchups">
                    <img src="/badminton/static/images/matchups.svg" alt="" class="mobile-nav-icon mobile-nav-icon--gradient">
                </a>
            </li>
            <li class="mobile-nav-item">
                <a class="mobile-nav-link" href="/badminton/history" aria-label="History">
                    <img src="/badminton/static/images/history.svg" alt="" class="mobile-nav-icon">
                </a>
            </li>
            <li class="mobile-nav-item">
                <a class="mobile-nav-link" href="/badminton/stats" aria-label="Stats">
                    <img src="/badminton/static/images/stats.svg" alt="" class="mobile-nav-icon">
                </a>
            </li>
        </ul>
    </nav>

    <!-- Overlay/backdrop to close nav on outside click -->
    <div id="nav-overlay" class="nav-overlay"></div>

    <!-- Navigation -->
    <nav class="navbar desktop-navbar">
        <div class="nav-container">
            <a href="/badminton/" class="nav-brand">
                <img src="/badminton/static/images/logo.png?v={{ range(1, 999999999) | random }}" alt="Badminton Manager" class="nav-logo">
            </a>
            <ul class="nav-links">
                <li><a href="/badminton/dashboard" {% if request.endpoint == 'dashboard_page' %}class="active"{% endif %}>Dashboard</a></li>
                {% if current_user.is_authenticated %}
                <li><a href="/badminton/profile" {% if request.endpoint == 'profile_page' %}class="active"{% endif %}>Profile</a></li>
                {% endif %}
                <li><a href="/badminton/players" {% if request.endpoint == 'players_page' %}class="active"{% endif %}>Players</a></li>
                <li><a href="/badminton/matchups" {% if request.endpoint == 'matchups_page' %}class="active"{% endif %}>Matchups</a></li>
                <li><a href="/badminton/history" {% if request.endpoint == 'history_page' %}class="active"{% endif %}>History</a></li>
                <li><a href="/badminton/stats" {% if request.endpoint == 'stats_page' %}class="active"{% endif %}>Stats</a></li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- JavaScript -->
    {% block extra_js %}{% endblock %}
    {% block main_js %}
    <script src="/badminton/static/js/main.js?v=1767444723" defer></script>
    {% endblock %}
    
    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/badminton/sw.js')
                    .then(reg => console.log('[PWA] Service worker registered:', reg.scope))
                    .catch(err => console.error('[PWA] Service worker registration failed:', err));
            });
        }
        
        // PWA Install Prompt (Android/Chrome)
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            console.log('[PWA] Install prompt available');
            e.preventDefault();
            deferredPrompt = e;
            
            // Show install button if it exists on the page
            const installBtn = document.getElementById('pwaInstallBtn');
            if (installBtn) {
                installBtn.style.display = 'block';
                installBtn.addEventListener('click', async () => {
                    if (!deferredPrompt) return;
                    
                    installBtn.disabled = true;
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    console.log('[PWA] User choice:', outcome);
                    deferredPrompt = null;
                    installBtn.style.display = 'none';
                });
            }
        });
        
        // Track when app is installed
        window.addEventListener('appinstalled', () => {
            console.log('[PWA] App installed successfully');
            deferredPrompt = null;
        });
    </script>
</body>
</html>
